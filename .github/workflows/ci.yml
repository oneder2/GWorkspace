name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm run audit:frontend

      - name: Check frontend debug logs
        run: npm run check:frontend-debug

      - name: Build frontend
        run: npm run build

      - name: Check frontend budget
        run: npm run check:frontend-budget

      - name: Check public SEO entrypoints
        run: npm run check:seo

      - name: Check environment examples
        run: npm run check:env

  backend-smoke:
    name: Backend Smoke Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci --omit=dev

      - name: Audit backend dependencies
        run: npm run audit:backend

      - name: Prepare database schema
        run: |
          cd backend
          DATABASE_PATH="$RUNNER_TEMP/gworkspace-ci.db" npm run db:prepare

      - name: Check database health
        run: |
          cd backend
          DATABASE_PATH="$RUNNER_TEMP/gworkspace-ci.db" npm run db:check

      - name: Verify backend modules load
        run: npm run check:backend-routes

      - name: Check backend log hygiene
        run: npm run check:backend-logs

      - name: Check backend security configuration
        run: npm run check:backend-security

      - name: Check backend CORS methods
        run: npm run check:cors

      - name: Check backend SEO sitemap
        run: npm run check:backend-seo
