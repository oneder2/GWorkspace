name: Backend Deployment

# 触发条件：推送到 main 分支时触发
# 注意：前端通过 Vercel 的 GitHub 集成自动部署，无需在此配置
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # 允许手动触发

jobs:
  # 后端部署到自建服务器
  deploy-backend:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci --production

      - name: Create deployment package
        run: |
          # 创建部署包，排除不需要的文件
          tar -czf backend-deploy.tar.gz \
            --exclude='backend/node_modules' \
            --exclude='backend/.git' \
            --exclude='backend/.env' \
            --exclude='backend/database/*.db' \
            --exclude='backend/database/*.db-journal' \
            backend/

      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend-deploy.tar.gz"
          target: "/tmp"
          strip_components: 0

      - name: Extract and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 传递机密变量给远程脚本
          envs: R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PUBLIC_DOMAIN
          script: |
            # 设置变量
            DEPLOY_DIR="$HOME/gworkspace/backend"
            BACKUP_DIR="$HOME/gworkspace/backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            
            # 创建必要的目录
            mkdir -p $DEPLOY_DIR
            mkdir -p $BACKUP_DIR
            
            # 备份当前版本
            if [ -d "$DEPLOY_DIR" ] && [ "$(ls -A $DEPLOY_DIR 2>/dev/null)" ]; then
              echo "Backing up current version..."
              tar -czf "$BACKUP_DIR/backend-backup-$TIMESTAMP.tar.gz" -C $DEPLOY_DIR . 2>/dev/null || true
            fi
            
            # 保存现有的.env文件到临时位置
            ENV_TEMP="/tmp/.env.backup-$$"
            if [ -f "$DEPLOY_DIR/.env" ]; then
              cp "$DEPLOY_DIR/.env" "$ENV_TEMP"
            fi
            
            # 保存现有数据库文件
            DB_TEMP="/tmp/gworkspace.db.backup-$$"
            if [ -f "$DEPLOY_DIR/database/gworkspace.db" ]; then
              cp "$DEPLOY_DIR/database/gworkspace.db" "$DB_TEMP"
            fi
            
            # 解压新版本到临时目录
            TEMP_DIR="/tmp/gworkspace-deploy-$TIMESTAMP"
            mkdir -p $TEMP_DIR
            tar -xzf /tmp/backend-deploy.tar.gz -C $TEMP_DIR --strip-components=1
            
            # 停止服务
            pm2 stop gworkspace-backend 2>/dev/null || true
            pm2 delete gworkspace-backend 2>/dev/null || true
            
            # 复制新文件
            echo "Deploying new version..."
            if [ -d "$TEMP_DIR" ]; then
              find "$TEMP_DIR" -type f ! -path "*/node_modules/*" ! -name ".env" ! -path "*/database/*.db*" -exec sh -c '
                  src="$1"; dest="$2"; rel_path="${src#$3/}"; target="$dest/$rel_path"
                  mkdir -p "$(dirname "$target")"
                  cp "$src" "$target"
                ' _ {} "$DEPLOY_DIR" "$TEMP_DIR" \;
            fi
            
            # 恢复数据库
            if [ -f "$DB_TEMP" ]; then
              mkdir -p "$DEPLOY_DIR/database"
              cp "$DB_TEMP" "$DEPLOY_DIR/database/gworkspace.db"
              rm -f "$DB_TEMP"
            fi
            
            # 处理 .env 注入逻辑
            if [ -f "$ENV_TEMP" ]; then
              cp "$ENV_TEMP" "$DEPLOY_DIR/.env"
              rm -f "$ENV_TEMP"
            else
              touch "$DEPLOY_DIR/.env"
            fi
            
            # 自动更新 R2 变量到 .env 文件
            update_env() {
              key=$1; val=$2
              if [ -n "$val" ]; then
                if grep -q "^$key=" "$DEPLOY_DIR/.env"; then
                  sed -i "s|^$key=.*|$key=$val|" "$DEPLOY_DIR/.env"
                else
                  echo "$key=$val" >> "$DEPLOY_DIR/.env"
                fi
              fi
            }

            echo "Injecting R2 configurations from GitHub Secrets..."
            update_env "R2_ACCOUNT_ID" "$R2_ACCOUNT_ID"
            update_env "R2_ACCESS_KEY_ID" "$ACCESS_KEY_ID" # appleboy envs 使用缩写前缀映射或直接引用
            # 注意：appleboy ssh-action 会将 secrets 映射为环境变量名
            update_env "R2_ACCESS_KEY_ID" "${{ secrets.R2_ACCESS_KEY_ID }}"
            update_env "R2_SECRET_ACCESS_KEY" "${{ secrets.R2_SECRET_ACCESS_KEY }}"
            update_env "R2_ACCOUNT_ID" "${{ secrets.R2_ACCOUNT_ID }}"
            update_env "R2_BUCKET_NAME" "${{ secrets.R2_BUCKET_NAME }}"
            update_env "R2_PUBLIC_DOMAIN" "${{ secrets.R2_PUBLIC_DOMAIN }}"
            
            # 确保在正确的目录
            cd $DEPLOY_DIR
            
            # 安装构建工具并编译原生模块
            export npm_config_build_from_source=true
            npm install --omit=dev --no-audit --build-from-source
            npm rebuild better-sqlite3 --build-from-source
            
            # 启动服务
            pm2 start src/server.js --name gworkspace-backend
            pm2 save || true
            
            # 清理
            rm -rf $TEMP_DIR
            rm -f /tmp/backend-deploy.tar.gz
            
            echo "Deployment completed with R2 secrets injected!"

      - name: Cleanup
        if: always()
        run: rm -f backend-deploy.tar.gz
