name: Backend Deployment

# 触发条件：推送到 main 分支时触发
# 注意：前端通过 Vercel 的 GitHub 集成自动部署，无需在此配置
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  # 后端部署到自建服务器
  deploy-backend:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci --omit=dev

      - name: Verify backend modules load
        run: |
          cd backend
          node --input-type=module -e "await Promise.all(['./src/routes/blog.js','./src/routes/comments.js','./src/routes/likes.js','./src/routes/guestbook.js','./src/routes/analytics.js','./src/routes/admin.js'].map(p => import(p))); console.log('backend modules ok')"

      - name: Create deployment package
        run: |
          # 创建部署包，排除不需要的文件
          tar -czf backend-deploy.tar.gz \
            --exclude='backend/node_modules' \
            --exclude='backend/.git' \
            --exclude='backend/.env' \
            --exclude='backend/database/*.db*' \
            backend/

      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend-deploy.tar.gz"
          target: "/tmp"
          strip_components: 0

      - name: Extract and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # 设置变量
            DEPLOY_DIR="$HOME/gworkspace/backend"
            BACKUP_DIR="$HOME/gworkspace/backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}"
            R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}"
            R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}"
            R2_BUCKET_NAME="${{ secrets.R2_BUCKET_NAME }}"
            R2_PUBLIC_DOMAIN="${{ secrets.R2_PUBLIC_DOMAIN }}"

            require_secret() {
              key="$1"
              value="$2"
              if [ -z "$value" ]; then
                echo "Missing required deploy secret: $key" >&2
                exit 1
              fi
            }

            require_secret "R2_ACCESS_KEY_ID" "$R2_ACCESS_KEY_ID"
            require_secret "R2_SECRET_ACCESS_KEY" "$R2_SECRET_ACCESS_KEY"
            require_secret "R2_ACCOUNT_ID" "$R2_ACCOUNT_ID"
            require_secret "R2_BUCKET_NAME" "$R2_BUCKET_NAME"
            require_secret "R2_PUBLIC_DOMAIN" "$R2_PUBLIC_DOMAIN"
            
            # 创建必要的目录
            mkdir -p $DEPLOY_DIR
            mkdir -p $BACKUP_DIR
            
            # 保存现有的.env文件到临时位置
            ENV_TEMP="/tmp/.env.backup-$$"
            if [ -f "$DEPLOY_DIR/.env" ]; then
              cp "$DEPLOY_DIR/.env" "$ENV_TEMP"
            fi
            
            # 先停止服务，确保 SQLite WAL 数据被安全 checkpoint 到主库
            pm2 stop gworkspace-backend 2>/dev/null || true
            pm2 delete gworkspace-backend 2>/dev/null || true
            
            # 在服务停止后再备份，避免 WAL 模式下只备份到过旧的主库快照
            if [ -d "$DEPLOY_DIR" ] && [ "$(ls -A $DEPLOY_DIR 2>/dev/null)" ]; then
              echo "Backing up current version..."
              tar -czf "$BACKUP_DIR/backend-backup-$TIMESTAMP.tar.gz" -C $DEPLOY_DIR . 2>/dev/null || true
            fi

            # 解压新版本到临时目录
            TEMP_DIR="/tmp/gworkspace-deploy-$TIMESTAMP"
            mkdir -p $TEMP_DIR
            tar -xzf /tmp/backend-deploy.tar.gz -C $TEMP_DIR --strip-components=1
            
            # 清理旧代码，但保留环境变量和数据库目录。
            # 这里只删除部署目录的第一层条目，避免 find 在递归遍历 node_modules 时
            # 因为目标被 rm -rf 提前删掉而返回 “No such file or directory”。
            echo "Deploying new version..."
            find "$DEPLOY_DIR" -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'database' \
              -exec rm -rf {} +

            cp -a "$TEMP_DIR"/. "$DEPLOY_DIR"/
            
            # 数据库文件直接保留原位。
            # 部署包本身不包含 *.db*，因此这里绝不能再用临时拷贝覆盖主库，
            # 否则在 SQLite WAL 模式下会把数据库回退到旧 checkpoint。
            
            # 处理 .env 注入逻辑
            if [ -f "$ENV_TEMP" ]; then
              cp "$ENV_TEMP" "$DEPLOY_DIR/.env"
              rm -f "$ENV_TEMP"
            else
              touch "$DEPLOY_DIR/.env"
            fi
            
            # 自动更新 R2 变量到 .env 文件
            update_env() {
              key=$1; val=$2
              if [ -n "$val" ]; then
                if grep -q "^$key=" "$DEPLOY_DIR/.env"; then
                  sed -i "s|^$key=.*|$key=$val|" "$DEPLOY_DIR/.env"
                else
                  echo "$key=$val" >> "$DEPLOY_DIR/.env"
                fi
              fi
            }

            echo "Injecting R2 configurations from GitHub Secrets..."
            update_env "R2_ACCESS_KEY_ID" "$R2_ACCESS_KEY_ID"
            update_env "R2_SECRET_ACCESS_KEY" "$R2_SECRET_ACCESS_KEY"
            update_env "R2_ACCOUNT_ID" "$R2_ACCOUNT_ID"
            update_env "R2_BUCKET_NAME" "$R2_BUCKET_NAME"
            update_env "R2_PUBLIC_DOMAIN" "$R2_PUBLIC_DOMAIN"
            
            # 确保在正确的目录
            cd $DEPLOY_DIR
            
            # 重新安装生产依赖
            # 当前后端固定使用 better-sqlite3 9.4.3，以兼容服务器较旧的 glibc 与 g++。
            # 新版 12.x 在该环境下会先因预编译产物依赖更高版本 glibc 失败，
            # 再回退到要求 -std=c++20 的源码编译，最终导致部署中断。
            npm ci --omit=dev --no-audit

            # 显式执行迁移和数据库健康检查，避免把问题带到启动之后
            npm run db:prepare
            npm run db:check
            
            # 启动服务
            pm2 start src/server.js --name gworkspace-backend
            pm2 save || true

            # 基础健康检查，避免“部署成功但服务未启动”被静默吞掉
            sleep 3
            HEALTH_OUTPUT="$(curl -fsS "http://127.0.0.1:3001/health")"
            echo "$HEALTH_OUTPUT" | grep '"status":"ok"' >/dev/null
            echo "$HEALTH_OUTPUT" | grep '"database":"ok"' >/dev/null
            
            # 清理
            rm -rf $TEMP_DIR
            rm -f /tmp/backend-deploy.tar.gz
            
            echo "Deployment completed with R2 secrets injected!"

      - name: Cleanup
        if: always()
        run: rm -f backend-deploy.tar.gz
